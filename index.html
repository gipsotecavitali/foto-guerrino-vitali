<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Foto di Guerrino Vitali</title>

    <!-- Bootstrap Italia CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/css/bootstrap-italia.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-primary px-3 sticky-top">
        <span class="navbar-brand fw-semibold">Foto di Guerrino Vitali</span>
        <div class="d-flex align-items-center gap-2">
            <div class="btn-group" role="group" aria-label="Modalità di visualizzazione">
                <input type="radio" class="btn-check" name="viewMode" id="viewGallery" data-view="gallery">
                <label class="btn btn-outline-light btn-sm" for="viewGallery">Galleria</label>
                <input type="radio" class="btn-check" name="viewMode" id="viewMap" data-view="map" checked>
                <label class="btn btn-outline-light btn-sm" for="viewMap">Mappa</label>
            </div>
            <span class="badge rounded-pill bg-white text-primary ms-1">
                <span id="total-photos">0</span> foto
            </span>
            <span class="badge rounded-pill bg-success">
                <span id="gps-photos">0</span> GPS
            </span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-0" id="view-container">
        <!-- Gallery View -->
        <div class="gallery-view h-100" id="gallery-view" style="display: none; overflow-y: auto;">
            <div class="container-fluid py-3">
                <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3" id="photo-grid">
                    <div class="col">
                        <div class="text-center text-muted py-5">
                            <div class="progress-spinner progress-spinner-active" role="progressbar" aria-label="Caricamento">
                                <span class="visually-hidden">Caricamento...</span>
                            </div>
                            <p class="mt-2">Caricamento foto...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map View -->
        <div class="map-view h-100" id="map-view">
            <div id="map" style="height: 100%; width: 100%;"></div>
        </div>

        <!-- Photo View (full-page photo viewer, replaces modal) -->
        <div id="photo-view">
            <!-- Navigation bar -->
            <div class="photo-nav-bar d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <button class="lbx-nav-btn" onclick="navigateLightbox(-1)" aria-label="Foto precedente">&#8249;</button>
                    <span id="lightbox-sequence" class="badge bg-secondary px-2">—</span>
                    <button class="lbx-nav-btn" onclick="navigateLightbox(1)" aria-label="Foto successiva">&#8250;</button>
                    <span id="lightbox-date" class="text-white-50 ms-2 small"></span>
                </div>
                <button class="lbx-nav-btn" onclick="closeLightbox()" aria-label="Chiudi foto">&#x2715;</button>
            </div>
            <!-- Image area -->
            <div class="lightbox-image-container">
                <div class="progress-spinner progress-spinner-active text-white position-absolute" id="lightbox-loader" style="display: none;" role="progressbar" aria-label="Caricamento immagine">
                    <span class="visually-hidden">Caricamento...</span>
                </div>
                <img id="lightbox-image" src="" alt="" class="img-fluid" style="max-height: 100%; max-width: 100%; object-fit: contain;">

                <!-- Zone Notification -->
                <div id="zone-notification" class="position-absolute top-0 start-50 translate-middle-x mt-3">
                    <div class="alert alert-info d-none" role="alert">
                        <svg class="icon icon-sm icon-white me-1"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/svg/sprites.svg#it-pin"></use></svg>
                        <span id="zone-text">Nuova Zona</span>
                    </div>
                </div>

                <!-- Map overlay -->
                <div class="lightbox-map-container position-absolute bottom-0 end-0 mb-3 me-3 bg-white rounded shadow" id="lightbox-map-container" style="width: 300px; height: 200px; z-index: 10;">
                    <button class="btn btn-sm btn-light position-absolute top-0 end-0 m-1 z-3" id="map-toggle-btn" title="Mostra/nascondi mappa" aria-label="Mostra/nascondi mappa">
                        <svg class="icon icon-sm"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/svg/sprites.svg#it-map-marker"></use></svg>
                    </button>
                    <div id="lightbox-map" style="width: 100%; height: 100%; border-radius: 0.25rem;"></div>
                </div>
            </div>
            <!-- Metadata bar -->
            <div class="photo-meta-bar d-flex flex-wrap gap-2 justify-content-center align-items-center">
                <span id="lightbox-gps" class="badge bg-success">
                    <svg class="icon icon-xs icon-white me-1"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/svg/sprites.svg#it-pin"></use></svg> --
                </span>
                <span id="lightbox-direction" class="badge bg-info">
                    <svg class="icon icon-xs icon-white me-1"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/svg/sprites.svg#it-arrow-up"></use></svg> --
                </span>
                <span id="lightbox-camera" class="badge bg-secondary">
                    <svg class="icon icon-xs icon-white me-1"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/svg/sprites.svg#it-camera"></use></svg> --
                </span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="copyright">
                <div class="container-fluid">
                    <small>Copyright © Gipsoteca Vitali di Cento - Licenza CC-BY-SA</small>
                </div>
            </footer>

    <!-- Bootstrap Italia JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.4/dist/js/bootstrap-italia.bundle.min.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>

</html>
